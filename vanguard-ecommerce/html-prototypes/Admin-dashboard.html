<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- High-End Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
        }
        
        .font-serif-italic {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.3); }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
        }

        .nav-item { transition: all 0.4s ease; }
        .nav-item:hover {
            background: rgba(0, 0, 0, 0.03);
            border-left: 1px solid rgba(0, 0, 0, 0.3);
            padding-left: 1.5rem;
            color: black;
        }
        .nav-item.active {
            background: rgba(0, 0, 0, 0.05);
            border-left: 1px solid rgba(0, 0, 0, 0.8);
            padding-left: 1.5rem;
            color: black;
        }

        .stat-card { transition: all 0.5s ease; }
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="text-gray-800 h-screen w-screen overflow-hidden selection:bg-black selection:text-white relative text-xs">

    <!-- Native Video Background -->
    <video id="bg-video" autoplay loop muted playsinline src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_083109_283f3553-e28f-428b-a723-d639c617eb2b.mp4" class="absolute inset-0 w-full h-full object-cover -z-20"></video>
    <!-- Dark overlay to ensure text readability -->
    <div class="absolute inset-0 bg-black/10 -z-10"></div>

    <div class="flex h-full w-full p-2 md:p-4 gap-4 relative z-10">
        
        <!-- Sidebar -->
        <aside class="w-16 md:w-56 glass-panel flex flex-col transition-all duration-500 z-20">
            <!-- Logo Area -->
            <div class="h-24 flex items-center justify-center border-b border-black/5">
                <span class="font-serif-italic text-2xl tracking-[0.1em] text-black hidden md:block">Admin</span>
                <span class="font-serif-italic text-2xl tracking-widest text-black block md:hidden">A</span>
            </div>
            
            <nav class="flex-1 py-8 flex flex-col gap-1 overflow-y-auto">
                <a href="Admin-dashboard.html" class="nav-item active w-full flex items-center py-3 px-4 text-black uppercase tracking-[0.2em] font-extralight">
                    <i class="fa-solid fa-chart-line w-5 text-center text-[10px]"></i>
                    <span class="ml-4 hidden md:block mt-0.5">Dashboard</span>
                </a>
                <a href="Admin-products.html" class="nav-item w-full flex items-center py-3 px-4 text-gray-800 hover:text-black uppercase tracking-[0.2em] font-extralight">
                    <i class="fa-solid fa-gem w-5 text-center text-[10px]"></i>
                    <span class="ml-4 hidden md:block mt-0.5">Products</span>
                </a>
                <a href="Admin-orders.html" class="nav-item w-full flex items-center py-3 px-4 text-gray-800 hover:text-black uppercase tracking-[0.2em] font-extralight">
                    <i class="fa-solid fa-box w-5 text-center text-[10px]"></i>
                    <span class="ml-4 hidden md:block mt-0.5">Orders</span>
                </a>

                <!-- LINK UPDATED: Customers -->
                <a href="Customers-info.html" class="nav-item w-full flex items-center py-3 px-4 text-gray-800 hover:text-black uppercase tracking-[0.2em] font-extralight">
                    <i class="fa-solid fa-users w-5 text-center text-[10px]"></i>
                    <span class="ml-4 hidden md:block mt-0.5">Customers</span>
                </a>
                
                <!-- LINK UPDATED: Analytics -->
                <a href="Analytics.html" class="nav-item w-full flex items-center py-3 px-4 text-gray-800 hover:text-black uppercase tracking-[0.2em] font-extralight">
                    <i class="fa-solid fa-chart-pie w-5 text-center text-[10px]"></i>
                    <span class="ml-4 hidden md:block mt-0.5">Analytics</span>
                </a>
                
                <!-- LINK UPDATED: Discounts -->
                <a href="discounts.html" class="nav-item w-full flex items-center py-3 px-4 text-gray-800 hover:text-black uppercase tracking-[0.2em] font-extralight">
                    <i class="fa-solid fa-tag w-5 text-center text-[10px]"></i>
                    <span class="ml-4 hidden md:block mt-0.5">Discounts</span>
                </a>
            </nav>

            <div class="border-t border-black/5 p-4">
                <a href="#" class="nav-item w-full flex items-center py-3 px-4 text-gray-800 hover:text-black uppercase tracking-[0.2em] font-extralight">
                    <i class="fa-solid fa-sliders w-5 text-center text-[10px]"></i>
                    <span class="ml-4 hidden md:block mt-0.5">Settings</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 glass-panel overflow-y-auto relative p-8 md:p-12">
            
            <header class="mb-12 border-b border-black/5 pb-6">
                <p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 mb-2">System Overview</p>
                <h1 class="font-serif-italic text-3xl md:text-4xl text-black tracking-[0.1em]">Dashboard</h1>
            </header>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                <!-- Stat Card 1 -->
                <div class="stat-card bg-white/10 border border-black/5 p-6 flex flex-col justify-between h-32 rounded-xl">
                    <div class="flex justify-between items-start">
                        <p class="text-[9px] text-gray-600 uppercase tracking-[0.3em]">Items</p>
                        <i class="fa-solid fa-gem text-black/40"></i>
                    </div>
                    <div>
                        <h3 class="font-serif-italic text-3xl text-black" id="dash-prod-count">0</h3>
                    </div>
                </div>
                <!-- Stat Card 2 -->
                <div class="stat-card bg-white/10 border border-black/5 p-6 flex flex-col justify-between h-32 rounded-xl">
                    <div class="flex justify-between items-start">
                        <p class="text-[9px] text-gray-600 uppercase tracking-[0.3em]">Revenue</p>
                        <i class="fa-solid fa-wallet text-black/40"></i>
                    </div>
                    <div>
                        <h3 class="font-serif-italic text-3xl text-black" id="dash-revenue">$0.00</h3>
                    </div>
                </div>
                <!-- Stat Card 3 -->
                <div class="stat-card bg-white/10 border border-black/5 p-6 flex flex-col justify-between h-32 rounded-xl">
                    <div class="flex justify-between items-start">
                        <p class="text-[9px] text-gray-600 uppercase tracking-[0.3em]">Orders</p>
                        <i class="fa-solid fa-box text-black/40"></i>
                    </div>
                    <div>
                        <h3 class="font-serif-italic text-3xl text-black" id="dash-orders-count">0</h3>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                <!-- Analytics Placeholder -->
                <div class="lg:col-span-2 border border-black/5 bg-white/10 h-[350px] flex flex-col items-center justify-center text-gray-500 relative overflow-hidden group rounded-2xl">
                    <span class="font-serif-italic text-xl tracking-[0.2em] text-gray-500 group-hover:text-black transition-all duration-700">Revenue Analytics</span>
                    <p class="text-[9px] uppercase tracking-[0.4em] mt-4 opacity-50 text-gray-600">Syncing with Analytics.html...</p>
                </div>

                <!-- Recent Activity Feed -->
                <div class="border border-black/5 bg-white/10 p-8 flex flex-col h-[350px] overflow-hidden rounded-2xl">
                    <h3 class="font-serif-italic text-xl tracking-[0.1em] text-black mb-6 border-b border-black/5 pb-4">Recent Activity</h3>
                    
                    <div id="recent-activity-container" class="flex-1 flex flex-col overflow-y-auto pr-2">
                        <!-- Data injected by Javascript -->
                        <p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 text-center mt-10">Loading recent orders...</p>
                    </div>
                </div>
            </div>
            
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            
            // 1. Fetch Real Products Count from Python Backend
            try {
                const res = await fetch('zshop-production-5704.up.railway.app/api/products');
                const data = await res.json();
                
                const productsArray = data.products ? data.products : (Array.isArray(data) ? data : []);
                document.getElementById('dash-prod-count').innerText = productsArray.length;
            } catch (error) {
                console.error("Backend offline, unable to fetch product count.", error);
                document.getElementById('dash-prod-count').innerText = "0";
            }

            // 2. Fetch Orders for Order Count, Revenue, and Recent Activity Feed
            try {
                const resOrders = await fetch('zshop-production-5704.up.railway.app/api/orders');
                const dataOrders = await resOrders.json();
                const globalOrders = dataOrders.orders || [];
                
                // Update Order Count
                document.getElementById('dash-orders-count').innerText = globalOrders.length;
                
                // Calculate Revenue
                let totalRevenue = 0;
                globalOrders.forEach(order => {
                    // Only sum up revenue for orders that are actually PAID or SHIPPED
                    if (order.status === "PAID & PROCESSING" || order.status === "SHIPPED") {
                        const amount = parseFloat(order.total.replace('$', '').replace(/,/g, ''));
                        if (!isNaN(amount)) {
                            totalRevenue += amount;
                        }
                    }
                });
                document.getElementById('dash-revenue').innerText = `$${totalRevenue.toFixed(2)}`;

                // Update Recent Activity Feed
                const activityContainer = document.getElementById('recent-activity-container');
                if (globalOrders.length === 0) {
                    activityContainer.innerHTML = '<p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 text-center mt-10 w-full">No recent activity</p>';
                } else {
                    activityContainer.innerHTML = '';
                    
                    // Show only the 4 most recent orders
                    const recentOrders = globalOrders.slice(0, 4);
                    
                    recentOrders.forEach(order => {
                        // Determine color based on status
                        let statusColor = "text-yellow-600";
                        if (order.status === "PAID & PROCESSING" || order.status === "SHIPPED") statusColor = "text-green-600";
                        if (order.status === "CANCELLED") statusColor = "text-red-600";

                        activityContainer.innerHTML += `
                            <div class="flex justify-between items-center w-full mb-4 last:mb-0 border-b border-black/5 pb-4 last:border-0 last:pb-0">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-black/5 flex items-center justify-center text-black/50">
                                        <i class="fa-solid fa-box text-[10px]"></i>
                                    </div>
                                    <div>
                                        <p class="text-[12px] font-bold text-black">${order.customer}</p>
                                        <p class="text-[9px] uppercase tracking-widest text-gray-500">${order.date}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-[12px] font-bold text-black">${order.total}</p>
                                    <p class="text-[8px] uppercase tracking-widest ${statusColor} font-bold mt-1">${order.status}</p>
                                </div>
                            </div>
                        `;
                    });
                }

            } catch (error) {
                console.error("Backend offline, unable to fetch orders.", error);
                
                // Fallback to localStorage if Python is not running
                const localOrders = JSON.parse(localStorage.getItem('zshop_global_orders')) || [];
                document.getElementById('dash-orders-count').innerText = localOrders.length;
                document.getElementById('recent-activity-container').innerHTML = '<p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 text-center mt-10 w-full">Offline Mode Active</p>';
            }
        });
    </script>
</body>
</html>
